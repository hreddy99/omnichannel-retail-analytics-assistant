# =============================================================================
# Omnichannel Retail Analytics Assistant - Governed Semantic Catalog (YAML)
# -----------------------------------------------------------------------------
# This file is the AUTHORITATIVE source of truth (Plan sections 6, 9).
# Every other knowledge layer (ChromaDB chunks, NetworkX graph) is generated
# from or validated against this catalog. If a retrieved definition or a graph
# edge conflicts with this file, YAML wins.
# =============================================================================

catalog_version: "4.1.0"
last_updated: "2026-06-07"
approved_for_mvp: true

# ----------------------------------------------------------------------------
# METRICS - certified definitions. SQL generation must validate against these.
# ----------------------------------------------------------------------------
metrics:
  digital_conversion_rate:
    domain: analytics
    owner: Analytics / Leadership
    definition: >
      Orders placed through digital channels divided by digital web sessions,
      for a given date. Sessions and orders are counted at day grain.
    grain: day
    formula: "count(distinct orders) / count(distinct sessions)"
    source_tables: [web_sessions, orders]
    baseline_rule: "Compare target day against the prior 7-day average."
    caveats:
      - "Same-day data may be incomplete; trust T-1 (yesterday) over T-0."
      - "Bot/internal traffic is excluded in synthetic data by construction."
    freshness_hours: 24

  paid_social_conversion:
    domain: marketing
    owner: Marketing
    definition: "Conversion rate restricted to channel = 'paid_social'."
    grain: day
    source_tables: [web_sessions, orders]
    caveats: ["Campaign mix shifts can move blended conversion without any funnel defect."]
    freshness_hours: 24

  stockout_rate:
    domain: merchandising
    owner: Merchandising
    definition: "Share of viewed products flagged not available_online for a category/day."
    grain: day
    source_tables: [inventory]
    caveats: ["High product views with low availability suppresses conversion."]
    freshness_hours: 24

  fulfillment_delay_days:
    domain: fulfillment
    owner: Fulfillment Operations
    definition: "Average promised delivery delay (days) by region/day."
    grain: day
    source_tables: [fulfillment]
    caveats: ["Reduced fulfillment options can deter checkout even without explicit delay."]
    freshness_hours: 24

# ----------------------------------------------------------------------------
# TABLES - approved read-only sources. SQL validator blocks anything not here.
# ----------------------------------------------------------------------------
tables:
  web_sessions:
    grain: "one row per session"
    columns: [session_id, date, channel, campaign, category, region, device, converted]
    owner: Analytics
  orders:
    grain: "one row per order"
    columns: [order_id, date, channel, region, category, gross_amount, returned]
    owner: Analytics
  inventory:
    grain: "one row per category/day"
    columns: [date, category, product_views, available_online_flag, stockout_rate]
    owner: Merchandising
  fulfillment:
    grain: "one row per region/day"
    columns: [date, region, delay_days, options_available, cancellations]
    owner: Fulfillment Operations
  campaigns:
    grain: "one row per channel/campaign/day"
    columns: [date, channel, campaign, sessions, spend]
    owner: Marketing

# ----------------------------------------------------------------------------
# DRIVERS - candidate explanation paths used by the conditional ToT layer.
# Each maps to the tables / metric it interrogates and the accountable owner.
# ----------------------------------------------------------------------------
drivers:
  campaign_mix:
    label: "Campaign / channel mix shift"
    domain: marketing
    owner: Marketing
    metric: paid_social_conversion
    tables: [web_sessions, campaigns]
    sub_drivers: [paid_social_traffic_quality, promo_pullback]
    hypothesis: "Traffic shifted toward lower-converting paid channels."
  inventory_availability:
    label: "Inventory availability"
    domain: merchandising
    owner: Merchandising
    metric: stockout_rate
    tables: [inventory, web_sessions]
    sub_drivers: [stockout_severity, category_concentration]
    hypothesis: "High-view categories went out of stock, suppressing conversion."
  fulfillment_constraints:
    label: "Fulfillment constraints"
    domain: fulfillment
    owner: Fulfillment Operations
    metric: fulfillment_delay_days
    tables: [fulfillment]
    sub_drivers: [delivery_delay, option_availability]
    hypothesis: "Delivery delays or fewer options deterred checkout in some regions."
  funnel_behavior:
    label: "Funnel / on-site behavior"
    domain: analytics
    owner: Analytics
    metric: digital_conversion_rate
    tables: [web_sessions]
    sub_drivers: [device_mix, add_to_cart_drop]
    hypothesis: "On-site funnel defect reduced conversion independent of traffic."

# ----------------------------------------------------------------------------
# OWNERS - routing targets for recommendations (read-only; no auto-actions).
# ----------------------------------------------------------------------------
owners:
  - {name: "Analytics / Leadership", domain: analytics}
  - {name: "Marketing", domain: marketing}
  - {name: "Merchandising", domain: merchandising}
  - {name: "Fulfillment Operations", domain: fulfillment}
  - {name: "Customer Service / Operations", domain: service}
  - {name: "Finance", domain: finance}

# ----------------------------------------------------------------------------
# APPROVED SQL TEMPLATES - core demo path. LLM may fill params only (Plan 10).
# ----------------------------------------------------------------------------
sql_templates:
  conversion_baseline: |
    WITH s AS (SELECT date, count(*) sessions, sum(converted) orders
               FROM web_sessions GROUP BY date)
    SELECT date, orders*1.0/sessions AS conversion FROM s ORDER BY date;
  channel_contribution: |
    SELECT channel,
           count(*) sessions,
           sum(converted)*1.0/count(*) AS conversion
    FROM web_sessions WHERE date = ? GROUP BY channel ORDER BY sessions DESC;
