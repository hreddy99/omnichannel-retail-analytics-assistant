# Approved synthetic tables (Plan sections 7.1, 14.2). The SQL validator blocks
# any table not listed here. fact_/dim_ naming mirrors the plan's data model.
section_id: tables
tables:
  fact_sessions:
    grain: "one row per session"
    keys: [session_id]
    columns: [session_id, date, channel, campaign_id, device, region, category_id, converted]
    allowed_joins: [fact_orders, dim_campaign, dim_category, fact_inventory_daily]
    freshness: "T-1"
    owner: "Digital Analytics"
    approved_use: "Denominator for digital conversion; traffic mix analysis."
  fact_events:
    grain: "one row per event"
    keys: [event_id]
    columns: [event_id, session_id, date, event_type, category_id, device]
    allowed_joins: [fact_sessions]
    freshness: "T-1"
    owner: "Digital Analytics"
    approved_use: "Checkout funnel (product_view, add_to_cart, checkout_start, purchase)."
  fact_orders:
    grain: "one row per order"
    keys: [order_id]
    columns: [order_id, session_id, date, channel, region, category_id, order_status, fulfillment_type, gross_amount, returned]
    allowed_joins: [fact_sessions, fact_order_items, fact_fulfillment]
    freshness: "T-1"
    owner: "Digital Analytics"
    approved_use: "Numerator for digital conversion; order analysis."
  fact_order_items:
    grain: "one row per order item"
    keys: [order_item_id]
    columns: [order_item_id, order_id, product_id, category_id, quantity, item_amount]
    allowed_joins: [fact_orders, dim_product]
    freshness: "T-1"
    owner: "Merchandising"
    approved_use: "Category/product drilldowns (Phase II/III)."
  fact_inventory_daily:
    grain: "one row per category/day"
    keys: [date, category_id]
    columns: [date, category_id, product_views, available_online_flag, stockout_rate]
    allowed_joins: [dim_category, fact_sessions]
    freshness: "T-1"
    owner: "Merchandising"
    approved_use: "Inventory availability and stockout pressure."
  fact_fulfillment:
    grain: "one row per region/fulfillment-type/day"
    keys: [date, region, fulfillment_type]
    columns: [date, region, fulfillment_type, promise_days, actual_days, delay_days, options_available, cancellations]
    allowed_joins: [fact_orders]
    freshness: "T-1"
    owner: "Fulfillment Operations"
    approved_use: "Delivery delays, option availability, cancellations."
  fact_customer_contacts:
    grain: "one row per contact"
    keys: [contact_id]
    columns: [contact_id, date, reason_code, channel, region]
    allowed_joins: [fact_orders]
    freshness: "T-1"
    owner: "Customer Service"
    approved_use: "Phase II: service-contact spikes and issue linkage."
  fact_finance_daily:
    grain: "one row per date/channel/category"
    keys: [date, channel, category_id]
    columns: [date, channel, category_id, gross_sales, returns, tax, shipping, adjustments, net_revenue]
    allowed_joins: [dim_category]
    freshness: "T-1"
    owner: "Finance"
    approved_use: "Phase III: gross-to-net reconciliation."
  dim_product:
    grain: "one row per product"
    keys: [product_id]
    columns: [product_id, product_name, category_id, brand, price_band, price, vendor_id, cpg_partner_flag]
    owner: "Merchandising"
    approved_use: "Product attributes; vendor/category partner insights."
  dim_category:
    grain: "one row per category"
    keys: [category_id]
    columns: [category_id, category_name, department, owner]
    owner: "Merchandising"
    approved_use: "Category hierarchy and owner routing."
  dim_campaign:
    grain: "one row per campaign"
    keys: [campaign_id]
    columns: [campaign_id, campaign_name, channel, start_date, end_date, spend, audience, owner]
    owner: "Marketing"
    approved_use: "Campaign attributes for marketing investigation."
